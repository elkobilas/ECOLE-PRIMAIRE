<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Debug - Gestion Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="alert alert-info">
                    <h4><i class="fas fa-info-circle me-2"></i>Test de Diagnostic</h4>
                    <p>Si vous voyez ce message, l'application HTML fonctionne.</p>
                    <p>Vérifiez la console du navigateur (F12) pour les erreurs JavaScript.</p>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5>Test des composants</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>Bootstrap :</h6>
                                <button class="btn btn-primary">Bouton Bootstrap</button>
                            </div>
                            <div class="col-md-6">
                                <h6>Font Awesome :</h6>
                                <i class="fas fa-school fa-2x text-primary"></i>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <div class="row">
                            <div class="col-12">
                                <h6>Test JavaScript :</h6>
                                <button class="btn btn-success" onclick="testJS()">Tester JavaScript</button>
                                <div id="js-result" class="mt-2"></div>
                            </div>
                        </div>
                        
                        <hr>
                        
                        <div class="row">
                            <div class="col-12">
                                <h6>Test des fichiers locaux :</h6>
                                <button class="btn btn-warning" onclick="testLocalFiles()">Tester les fichiers locaux</button>
                                <div id="local-result" class="mt-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-3">
                    <a href="index.html" class="btn btn-primary">
                        <i class="fas fa-arrow-left me-1"></i>Retour à l'application principale
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function testJS() {
            const result = document.getElementById('js-result');
            result.innerHTML = '<div class="alert alert-success">✅ JavaScript fonctionne correctement !</div>';
        }
        
        function testLocalFiles() {
            const result = document.getElementById('local-result');
            
            // Test de chargement des fichiers locaux
            const tests = [
                { name: 'CSS', url: 'css/style.css' },
                { name: 'App JS', url: 'js/app.js' },
                { name: 'Auth JS', url: 'js/auth.js' }
            ];
            
            let results = '<div class="alert alert-info">Test des fichiers locaux :</div>';
            
            tests.forEach(test => {
                fetch(test.url)
                    .then(response => {
                        if (response.ok) {
                            results += `<div class="text-success">✅ ${test.name} : OK</div>`;
                        } else {
                            results += `<div class="text-danger">❌ ${test.name} : Erreur ${response.status}</div>`;
                        }
                    })
                    .catch(error => {
                        results += `<div class="text-danger">❌ ${test.name} : ${error.message}</div>`;
                    })
                    .finally(() => {
                        result.innerHTML = results;
                    });
            });
        }
        
        // Test automatique au chargement
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ Page de test chargée avec succès');
            console.log('✅ Bootstrap chargé');
            console.log('✅ Font Awesome chargé');
        });
    </script>
</body>
</html>
