<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond circulaire -->
  <circle cx="100" cy="100" r="100" fill="#667eea"/>
  
  <!-- Visage -->
  <ellipse cx="100" cy="85" rx="35" ry="40" fill="#d4a574"/>
  
  <!-- Cheveux -->
  <path d="M 65 70 Q 100 50 135 70 Q 135 85 130 95 Q 125 90 120 85 Q 115 80 110 82 Q 105 80 100 82 Q 95 80 90 82 Q 85 80 80 85 Q 75 90 70 95 Q 65 85 65 70" fill="#2c1810"/>
  
  <!-- Yeux -->
  <circle cx="90" cy="75" r="8" fill="white"/>
  <circle cx="110" cy="75" r="8" fill="white"/>
  <circle cx="90" cy="75" r="5" fill="#4a90e2"/>
  <circle cx="110" cy="75" r="5" fill="#4a90e2"/>
  <circle cx="91" cy="73" r="2" fill="white"/>
  <circle cx="111" cy="73" r="2" fill="white"/>
  
  <!-- Sourcils -->
  <path d="M 82 65 Q 90 62 98 65" stroke="#2c1810" stroke-width="2" fill="none"/>
  <path d="M 102 65 Q 110 62 118 65" stroke="#2c1810" stroke-width="2" fill="none"/>
  
  <!-- Nez -->
  <ellipse cx="100" cy="85" rx="2" ry="4" fill="#c19a6b"/>
  
  <!-- Bouche -->
  <path d="M 95 95 Q 100 100 105 95" stroke="#d4a574" stroke-width="2" fill="none"/>
  
  <!-- Décoration du visage -->
  <circle cx="85" cy="85" r="3" fill="#4a90e2"/>
  <circle cx="87" cy="88" r="2" fill="#87ceeb"/>
  <circle cx="89" cy="91" r="2" fill="#4a90e2"/>
  
  <!-- Marque frontale -->
  <line x1="95" y1="55" x2="105" y2="55" stroke="white" stroke-width="1"/>
  
  <!-- Vêtements -->
  <path d="M 70 110 Q 100 130 130 110 L 135 140 Q 100 160 65 140 Z" fill="#20c997"/>
  
  <!-- Motifs floraux -->
  <circle cx="85" cy="125" r="4" fill="#ff6b6b"/>
  <circle cx="115" cy="125" r="4" fill="#ff6b6b"/>
  <circle cx="100" cy="135" r="3" fill="#ffd93d"/>
  
  <!-- Feuilles -->
  <ellipse cx="80" cy="120" rx="3" ry="6" fill="#2ecc71" transform="rotate(-30 80 120)"/>
  <ellipse cx="120" cy="120" rx="3" ry="6" fill="#2ecc71" transform="rotate(30 120 120)"/>
</svg>


